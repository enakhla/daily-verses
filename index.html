  :root {
    --bg: #faf6ee;
    --card-bg: #ffffff;
    --ink: #2c2620;
    --muted: #7a6f5f;
    --accent: #8a5a3b;
    --accent-soft: #f1e6d6;
    --border: #e6dcc8;
    --empty-bg: #f4efe4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1b1712;
      --card-bg: #262019;
      --ink: #f1e9db;
      --muted: #b3a48c;
      --accent: #e0a877;
      --accent-soft: #332920;
      --border: #3a3226;
      --empty-bg: #211c16;
    }
  }
  :root[data-theme="light"] {
    --bg: #faf6ee; --card-bg: #ffffff; --ink: #2c2620; --muted: #7a6f5f;
    --accent: #8a5a3b; --accent-soft: #f1e6d6; --border: #e6dcc8; --empty-bg: #f4efe4;
  }
  :root[data-theme="dark"] {
    --bg: #1b1712; --card-bg: #262019; --ink: #f1e9db; --muted: #b3a48c;
    --accent: #e0a877; --accent-soft: #332920; --border: #3a3226; --empty-bg: #211c16;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  .app-title {
    font-family: "Caveat", "Lora", Georgia, "Times New Roman", serif;
    font-size: 2.8rem;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
  }
  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 18px 0 32px;
    flex-wrap: wrap;
  }
  .nav button {
    font-family: inherit;
    font-size: 0.9rem;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--ink);
    cursor: pointer;
  }
  .nav button:hover { background: var(--accent-soft); }
  .nav .today-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .date-control {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    padding: 5px 14px 7px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--card-bg);
  }
  .date-control input[type="date"] {
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--ink);
    border: none;
    background: none;
    padding: 0;
    cursor: text;
  }
  .date-control .subdate {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 26px;
    margin-bottom: 20px;
  }
  .card .label {
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .verse-block { margin-bottom: 18px; }
  .verse-block:last-child { margin-bottom: 0; }
  .verse-text {
    font-family: "Lora", Georgia, "Times New Roman", serif;
    font-size: 1.2rem;
    line-height: 1.6;
    white-space: pre-line;
    margin-bottom: 10px;
  }
  .verse-ref {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--muted);
  }
  .gloss-word {
    font: inherit;
    color: inherit;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    text-decoration: underline dotted;
    text-decoration-color: var(--accent);
    text-underline-offset: 3px;
  }
  .gloss-word:hover { color: var(--accent); }
  .word-definition {
    font-family: "Lora", Georgia, serif;

<script>
window.addEventListener('load', function() {
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.arcTo(size, 0, size, size, r);
    ctx.arcTo(size, size, 0, size, r);
    ctx.arcTo(0, size, 0, 0, r);
    ctx.arcTo(0, 0, size, 0, r);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#c98a54');
    grad.addColorStop(1, '#7a4d30');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.font = Math.round(size * 0.55) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F64F}', size / 2, size * 0.56);
    return c.toDataURL('image/png');
  }

  function addLink(rel, href, sizes) {
    const l = document.createElement('link');
    l.rel = rel;
    l.href = href;
    if (sizes) l.sizes = sizes;
    document.head.appendChild(l);
  }

  const icon180 = makeIcon(180);
  const icon512 = makeIcon(512);
  addLink('apple-touch-icon', icon180);
  addLink('icon', icon180, '180x180');
  addLink('icon', icon512, '512x512');

  const manifest = {
    name: 'Daily Verses',
    short_name: 'Verses',
    start_url: '.',
    display: 'standalone',
    background_color: '#faf6ee',
    theme_color: '#8a5a3b',
    icons: [
      { src: icon180, sizes: '180x180', type: 'image/png' },
      { src: icon512, sizes: '512x512', type: 'image/png' }
    ]
  };
  addLink('manifest', 'data:application/manifest+json;base64,' + btoa(JSON.stringify(manifest)));
});
</script>

[4,30,"Revelation 7:12","Blessing and glory and wisdom, thanksgiving and honor and power and might be to our God forever and ever. Amen.\n1. Blessing (eulogia) — a good word, a praise\n2. Glory (doxa) — honor derived from one’s character and a good reputation; it is the radiance or outshining of the divine person\n3. Wisdom (sophia) — divine knowledge and perspective on all things, especially in the outworking of God’s plan of salvation\n4. Thanksgiving (eucharistia) — we get our word eucharist from it\n5. Honor (timē) — esteem; public and deserved recognition (see 4:11; 5:12-13)\n6. Power (dunamis) — God’s omnipotence; His ability to act as He wills\n7. Strength (ischus) — often related to God’s mighty acts in salvation history\nAll of this has one focus, one direction, one and only one deserving object: “to our God forever and ever” (7:12). This word of worship is not temporary; it is eternal. It is not for a moment but forever. This is the praise of all nations and angels that is ringing through the vast expanse of heaven."],

// ---- App logic -------------------------------------------------------------

function buildIndex(list) {
  const idx = {};
  for (const [m, d, ref, text] of list) {
    const key = m + "-" + d;
    (idx[key] = idx[key] || []).push({ ref, text });
  }
  return idx;
}

const INDEX = {
  prayer: buildIndex(PRAYER),
  meditation: buildIndex(MEDITATION),
  worship: buildIndex(WORSHIP),
};

// ---- Curated explanations --------------------------------------------------
// Original writing, ad-free. A named quote only appears when it's a real,
// checked quote (source noted); otherwise it's synthesis, not attributed to anyone.
// Written and filled in gradually, day by day, rather than all at once.

const EXPLANATIONS = {
  worship: {
    "7-14": "The hard part: why would the sinless Son of God need to be baptized, a rite for repentance? He is not washing away sin. He is stepping into the water with us, joining Himself to sinners before He ever does anything else in His ministry. And at that moment, uniquely, we see Father, Son, and Spirit together: the Father speaking from heaven, the Son rising from the Jordan, the Spirit descending like a dove. Before Jesus preaches a word, God shows us who He is.",
    "7-15": "The chief priests are offended by noise in a holy place. Jesus answers with Psalm 8: God has ordained praise from the mouths of infants and nursing babies. The hard part to sit with: the children saw plainly what the religious leaders, for all their learning, could not. Recognizing Jesus does not require sophistication. It requires open eyes.",
    "7-16": "This is the moment the whole trial turns. The high priest puts Jesus under oath to answer one question: are You the Christ, the Son of God? Jesus could have stayed silent and likely lived. Instead He says yes, and adds that they will see Him coming on the clouds, Daniel's language for divine judgment. He is condemned for telling the truth about who He is.",
    "7-17": "David does not try to catalog God's works. He says outright that he can't: they are more than can be numbered. The proper response to God's greatness is not a complete inventory. It is worship that admits its own limits.",
    "7-18": "Paul roots generosity in the gospel itself, not in guilt or obligation. Christ's poverty was not an accident of His birth; it was chosen, for us. Every act of Christian generosity traces back to this: He had everything and gave it away so we could be rich in Him.",
    "7-19": "The cloud lifts, Moses and Elijah are gone, and only Jesus remains. That is the whole point of the Transfiguration: not to add two more figures of authority alongside Christ, but to strip everything else away until He alone is left standing. The Law and the Prophets point to Him and then step back.",
    "7-20": "God interrupts Peter mid-sentence, while he is still proposing to build three shelters, one for Jesus, one for Moses, one for Elijah. The Father's response corrects him: this is My Son, hear Him, not them. Even good intentions can put Jesus on the same level as Scripture's greatest saints. He is not one voice among several. He is the one to listen to.",
    "7-21": "Joseph names what actually happened: God sent him ahead, using the very trafficking and imprisonment his brothers meant for evil, to save lives, including theirs. He does not minimize what was done to him. He reframes it inside a bigger purpose he could only see from the other side. The hard part: this kind of clarity almost always comes after the suffering, not during it.",
    "7-22": "Paul opens his most theologically dense letter by grounding everything in two claims about Jesus: fully human, of the seed of David, and declared Son of God with power by the resurrection. Before Paul argues anything else in Romans, he anchors the whole letter to a real, historical, bodily raised Christ. Take away the resurrection, and the rest of the letter has nothing to stand on.",
    "7-23": "Jesus asks a pointed question: which is easier to say, your sins are forgiven, or get up and walk? Both are equally impossible for a mere man to accomplish, which is exactly His point. He heals the visible problem to prove He had already solved the invisible one. The miracle is the evidence; the forgiveness was the actual purpose.",
    "7-24": "Paul has just spent three chapters wrestling with hard questions about Israel, election, and mercy, and here he stops arguing and starts worshiping. Some questions about God's ways do not resolve into a tidy answer, they resolve into praise. The hard part to accept: unsearchable does not mean unknowable, it means some things about God are meant to humble us, not fully explain themselves.",
    "7-25": "The cloud that overshadows them echoes the cloud of God's presence that filled the wilderness tabernacle (Exodus 40:34-35). This is not ordinary weather, it is the same divine presence Israel once encountered, now surrounding Jesus and confirming Him. When the cloud lifts, only Jesus remains. Every other voice, however great, was a witness pointing at Him.",
    "7-26": "The disciples' fear before the storm makes sense, it was genuinely life-threatening. Their fear after Jesus calms it is different, and in some ways larger: “who can this be?” The hard part in this story is not the storm, it is realizing that meeting real power is more unsettling than facing real danger. Awe, not relief, is the right response to who Jesus actually is.",
    "7-27": "Jesus does not debate the demon or negotiate with it. One word, “be quiet, and come out,” and it obeys instantly. The crowd's question afterward is the real point of the story: “what new doctrine is this?” They had heard rabbis teach with citations and precedent. Jesus taught, and things obeyed Him, with nothing to back it up but His own authority.",
  },
  meditation: {
    "7-14": "Peter does not describe the dissolving of the world to frighten his readers into inaction. He asks a pointed question: since all this is coming, what manner of persons ought you to be? The proper response to knowing the world is temporary is not despair, but holy conduct and hope, looking for what is permanent.",
    "7-15": "Moses and Elijah do not appear at the Transfiguration to reminisce. Luke tells us plainly what they discussed: Jesus's ‘departure,’ literally His exodus, which He was about to accomplish at Jerusalem. The Law and the Prophets were not surprised by the cross. They had been pointing toward it all along.",
    "7-16": "Paul does not appeal to his theology alone. He tells Timothy: you have observed my teaching, my conduct, my aim, my faith, my patience. A life can be examined the same way a sermon can. Paul was willing to have his.",
    "7-17": "Joseph's brothers expect revenge now that their father is dead and nothing restrains him. Instead he weeps and reassures them. The hard part he had to work through long before this moment: distinguishing what people intended from what God intended, without pretending the harm never happened. He does not say it was not evil. He says God used it for good anyway.",
    "7-18": "God let Israel hunger in the wilderness on purpose, then fed them with something they had never seen, to teach them a lesson they could not learn any other way: that life does not ultimately come from bread. Sometimes God removes what we depend on so we discover what we actually need.",
    "7-19": "Face to face, as a man speaks to his friend. This is the highest kind of intimacy Scripture ascribes to Moses, and it did not happen because Moses earned it through performance. It happened in the tent of meeting, in the ordinary practice of showing up to talk with God.",
    "7-20": "This is one of the hardest sayings Jesus speaks: not peace, but a sword; setting family members against each other. Bonhoeffer, writing under the shadow of the Nazi regime, took this warning seriously: “The messengers of Jesus will be hated to the end of time… they will be called crazy fanatics and disturbers of the peace.” (The Cost of Discipleship) Jesus is not commanding division. He is telling us in advance that loyalty to Him will sometimes cost exactly that, and that it is worth it anyway.",
    "7-21": "This proverb is not really about career advancement. Skill exercised with excellence gets noticed, that is simply how the world works, and Proverbs treats that as something built into a well-ordered creation. The application is not “work hard to get promoted.” It is that diligence has a way of being seen, so do the work as if it matters, because it does.",
    "7-22": "This is a roster entry for one of David's mighty men, remembered for a single, staggering feat of courage. Scripture does not only record theology and prophecy, it also keeps score on real acts of valor by ordinary soldiers. The lesson here is modest but real: faithfulness in a specific, difficult moment is worth remembering, even centuries later.",
  },
  prayer: {
    "7-14": "This promise comes in the middle of a letter to exiles told to settle down, build houses, and wait seventy years. God is not offering a shortcut out of hard circumstances. He is promising Himself, found by those who seek with their whole heart, right in the middle of the waiting.",
    "7-15": "Four short commands, then one that governs all the others: let all that you do be done in love. Watchfulness, firmness, and strength without love turn hard and cold. Paul will not let vigilance become an excuse for losing charity.",
    "7-16": "Blessed, not because the blameless never fail, but because their way, their general direction and desire, is set toward God's law. This is about the trajectory of a life, not a perfect record.",
    "7-17": "Jesus claims equality with the Father in the same breath He claims total dependence on Him: the Son can do nothing of Himself. This is not a lesser Jesus. It is the pattern of the Trinity itself, and the pattern for us: authority is never for self-direction, but always in step with the Father.",
    "7-18": "Augustine spent real effort on just one phrase here, ‘daily bread,’ and refused to let it mean only food. He wrote: “There is a necessary supply of bodily food, for the preservation of our daily life... This is food and clothing, but the whole is understood in a part.” (Sermon on the Lord's Prayer) Even the plainest request in this prayer is asking for more than we usually notice.",
    "7-19": "Jesus does not simply promise the woman a better kind of water. Augustine, writing on this passage, said what Christ was really promising was “a certain feeding and abundant fullness of the Holy Spirit.” (Tractates on the Gospel of John) Every physical thirst points past itself to a thirst only God can satisfy.",
    "7-20": "Paul is not describing regret. He counted his credentials as loss deliberately, on purpose, because knowing Christ was worth more. C.S. Lewis put the same principle differently: “Aim at Heaven and you will get earth thrown in; aim at earth and you will get neither.” (Mere Christianity) Paul aimed at Christ and let everything else fall where it fell.",
    "7-21": "Every beatitude reverses what the world calls fortunate. Poverty, grief, hunger, and persecution are not obstacles to blessing here, they are where it is found. Jesus is not romanticizing suffering. He is saying the kingdom runs on different math than the one we were taught, and it starts with people who have nothing left to bring but their need.",
    "7-22": "Paul's logic moves from the hardest gift to the easiest one. If God already gave up His own Son for us, the greater and costlier gift, then withholding any lesser thing we need would make no sense. The hard part is not believing God can give; it is trusting that a God who has already proven this much generosity actually will.",
    "7-23": "The psalmist claims more understanding than his teachers and elders, which can sound like arrogance until you notice the source: not native intelligence, but time spent in God's testimonies. The lesson is not that Scripture makes you smarter than everyone around you. It is that sustained attention to God's word will outpace credentials that never went near it.",
    "7-24": "James does not just promise wisdom to those who ask, he warns against asking with a divided heart. The doubter he describes is not someone with honest questions, but someone pulled two directions at once, unwilling to actually receive what they are asking for. The hard part: God is not stingy with wisdom, but half-hearted asking gets a half-hearted answer.",
    "7-25": "John does not say his greatest joy is his own reputation or comfort. It is hearing that people he loves are walking in truth, a faithfulness that is not really about him at all. A short verse with a clear challenge: what would it mean to measure your own joy by someone else's faithfulness instead of your own circumstances?",
    "7-26": "This promise comes to Jeremiah while he is under arrest, the city under siege, everything falling apart (Jeremiah 33:1). God does not wait for better circumstances to make this offer. The hard part to receive: “call to Me” is not a formula that works once things calm down. It is an invitation issued in the middle of the worst of it.",
    "7-27": "Paul does not limit glorifying God to prayer or worship. Eating and drinking, the most ordinary acts there are, count too. John Piper put it this way: “‘Glorifying’ means feeling and thinking and acting in ways that reflect his greatness, that make much of God, that give evidence of the supreme greatness of all his attributes.” (Desiring God) Nothing is too small to either reflect God's greatness or obscure it.",
  },
};

const GLOSSARY = {
  "hosanna": "A Hebrew cry meaning “save now” or “save, we pray” (Psalm 118:25). By Jesus's day it had become a shout of praise and welcome to God's promised King. Today: still the church's word for “save us, Lord” turned into an anthem of worship — we cry it not because we're unsure God will save, but because we're certain He already has.",
  "son of man": "Jesus's own favorite title for Himself, drawn from Daniel 7:13-14, where “one like a son of man” comes on the clouds of heaven and is given an everlasting kingdom. It sounds humble but claims everything: full humanity and divine authority in one phrase. Today: when Jesus is called “the Son of Man,” it isn't softening His identity, it's pointing straight at His deity.",
  "grace": "Undeserved favor: God's goodness given to people who have no claim on it and could not earn it. In the New Testament it's tied directly to what Christ did, not what we do. Today: “grace” gets used loosely for any kindness, but its biblical weight is specific — help and forgiveness that flow entirely from God's initiative, never from our performance.",
  "godliness": "A life shaped by reverence for God, showing up in ordinary conduct, not just religious feeling. Peter pairs it with holy conduct because the two can't be separated. Today: often mistaken for niceness or moral effort, but its root is “godlikeness” — living in a way that reflects who God is, out of love for Him rather than fear of being caught.",
  "manna": "The bread-like food God provided each morning in the wilderness, which the Israelites had never seen before and couldn't stockpile — it had to be gathered fresh daily. Today: shorthand for provision that requires trust, arriving exactly when needed and not a day early.",
  "kingdom of god": "God's reign, wherever His authority is acknowledged and obeyed, not a place with borders. Jesus announced it had already begun breaking into the world in Him, though its fullness is still to come. Today: not a future-only hope but a present reality wherever Christ is King over a life.",
  "righteousness": "Right standing with God: not a record built through good behavior, but a status given through faith in Christ, crediting us with His righteousness instead of our own. Today: distinct from being a “good person” — it's a legal and relational reality, not a performance review.",
  "eternal life": "Not simply unending existence, but the specific life of knowing God through Christ, starting now and continuing forever (John 17:3). Today: often pictured as only a future reward, but Scripture treats it as a quality of life available the moment someone trusts Christ.",
  "cross": "In Jesus's day, an instrument of Roman execution reserved for the worst criminals and rebels. To take up your cross meant carrying your own execution beam, a walk with only one destination. Jesus turned that image into the definition of following Him: total, costly, public allegiance. Today: “a cross to bear” has been softened to mean any hardship, but Jesus meant something more specific — dying to self-rule so He can be Lord.",
  "hallowed": "To be treated as holy, set apart, uniquely sacred — not made holy (it already is) but recognized and honored as such by us. Today: the word barely survives in modern English outside this prayer, but its meaning persists in communion tables, wedding vows, and any moment we consciously set the sacred apart from the ordinary.",
  "spirit": "The third Person of the Trinity: fully God, sent to indwell, empower, and guide believers. At Jesus's baptism the Spirit visibly confirms Him as the Son the Father is well pleased with. Today: not a force or a feeling, but a Person to know — the same Spirit who descended on Jesus is the one who lives in every believer (Romans 8:9).",
  "son of david": "A messianic title rooted in God's promise that David's throne would last forever (2 Samuel 7:12-13). When the crowds cry it out to Jesus, they aren't just admiring Him, they're identifying Him as the promised King. Today: a reminder that Jesus's kingship wasn't a later add-on to His identity — it was expected, prophesied, and named from the start.",
  "christ": "Not Jesus's last name, but His title: the Greek translation of the Hebrew “Messiah,” meaning “Anointed One” — the promised King, Priest, and Prophet sent by God. When the high priest asks if Jesus is “the Christ,” he's asking the one question that determines everything. Today: “Jesus Christ” is really a confession, “Jesus is the Anointed One,” every time it's said.",
  "day of god": "Prophetic shorthand for the moment God sets everything right, judges evil, and remakes creation (also called “the Day of the Lord” in the Old Testament). Peter uses it to describe both an ending and a beginning. Today: not meant to produce anxiety about a deadline, but hope that history is going somewhere, and that somewhere is good.",
  "glory": "The visible weight of God's presence: not simply brightness, but the tangible evidence that God Himself is near. At the Transfiguration, Jesus's glory isn't put on Him, it's His own glory breaking through what usually stays hidden. Today: “glory” often gets flattened into a synonym for praise, but in Scripture it starts as something you'd see and feel, not just say.",
  "steadfastness": "Endurance that holds its course under pressure, not by gritting through but by staying anchored to something outside the difficulty itself. Paul lists it alongside faith, love, and patience as something Timothy actually watched him live out. Today: distinct from stubbornness — steadfastness is aimed at faithfulness to Christ, not just refusing to quit.",
  "commandments": "God's revealed instructions for His people, given not as arbitrary rules but as the terms of a relationship already established by grace (He rescued Israel before He gave the commandments, not after). Today: keeping them is less about earning God's favor and more about staying in step with a God who has already committed Himself to you.",
  "tabernacle": "The portable tent where God's presence dwelled among Israel in the wilderness, the forerunner to the temple. That Joshua lingered there while Moses left shows an appetite for God's presence beyond what was required. Today: since Christ, God's dwelling place is no longer a tent but His people themselves (1 Corinthians 6:19) — the same appetite Joshua had is now an invitation, not a restriction.",
  "faith": "Not a feeling of certainty, but active trust in God that shows up as obedience, even before every question is answered. Paul can command believers to “stand firm in the faith” because faith is something you do, not just something you have. Today: often confused with optimism or wishful thinking, but biblical faith is trust placed in a specific, trustworthy Person, not a general positive outlook.",
  "law": "God's revealed teaching and instruction, most fully given through Moses — far broader than a list of rules, closer to a way of life laid out by God for His people's good. The psalmist calls those who walk in it “blessed,” not burdened. Today: Christians relate to it through Christ, who fulfilled it (Matthew 5:17), but its portrait of a flourishing life still shapes how we read all of Scripture.",
  "temptation": "The pull toward sin, whether from our own desires, the world, or the enemy — Jesus teaches us to pray for God to keep us away from it rather than trusting our own strength to resist it once we're in it. Today: a request for God to guard the door, not just help us win the fight once we're already inside the room.",
  "debts": "Sin pictured as something owed, a debt we cannot repay ourselves. Jesus ties being forgiven this debt directly to forgiving others theirs, in the very next line. Today: “debts” makes forgiveness concrete — not a vague feeling to work up, but the cancellation of something specific and real, extended to others the way it was extended to us.",
  "resurrection": "Not resuscitation back into the same mortal life, but bodily life raised into a new, imperishable kind of existence, beginning with Christ and promised to everyone united to Him. Paul wants to know its power now, not just receive it later. Today: resurrection isn't only a future event to hope for, it's a present power available to change how we live today.",
  "mercy": "Compassion shown to someone who deserves the opposite — not getting the punishment your actions actually earned. Distinct from grace, which gives what you don't deserve, mercy withholds what you do deserve. Today: often used loosely for any kindness, but biblical mercy specifically means being spared judgment you had coming.",
  "wisdom": "Not just information or cleverness, but the God-given skill of applying truth rightly to real situations — knowing not just what is right, but how to live it out. James says it's available simply by asking. Today: “wisdom” gets used for worldly savvy or life hacks, but Scripture ties it directly to the fear of the Lord (Proverbs 9:10) — it starts with who you trust, not what you know.",
  "truth": "Not just factual accuracy, but reality as God defines it, ultimately embodied in Christ Himself (John 14:6). To “walk in truth” means a life shaped by what's actually real about God, not by what feels true. Today: in a culture that treats truth as personal and adjustable, this word insists there's a reality outside us we're accountable to.",
  "gospel": "Literally “good news”: the announcement that Jesus, the promised Son of David, died for sins and was raised bodily from the dead, and that anyone can be reconciled to God through Him. Paul calls himself “separated” to it, set apart for this one message above all else. Today: often reduced to a private ticket to heaven, but the New Testament treats it as history-altering public news, meant to be announced, not just believed quietly.",
  "forgiveness": "The cancellation of a debt or offense that could rightfully be held against someone — not forgetting or excusing what happened, but releasing the claim to repayment. Jesus heals to prove He has the authority to forgive, the harder and more invisible miracle of the two. Today: often confused with reconciliation or trust being automatically restored, but forgiveness is the first act, not the whole process.",
  "cloud": "In the Old Testament, the visible sign of God's presence dwelling with His people, filling the tabernacle and leading Israel through the wilderness (Exodus 40:34-38). When a cloud overshadows Jesus at the Transfiguration, it's the same divine presence showing up again, now centered on Him. Today: a reminder that God's presence has always come with both nearness and mystery, close enough to lead, too much to fully see.",
  "authority": "The right to command and be obeyed, not just the power to do so. Jesus's teaching astonished people because it carried authority in itself, not because He cited other rabbis the way the scribes did. Today: authority without the character or truth to back it up is just force — Jesus is the rare case where the claim and the power to back it up are the same thing.",
  "deliverance": "Rescue from real danger by someone with the power to accomplish it — not a close call or good luck, but God intervening. Joseph names his enslavement and imprisonment as the very means of a “great deliverance” for his family. Today: often narrowed to dramatic rescues, but Scripture uses it for any situation where God alone gets the credit for getting someone through.",
};

const LABELS = { prayer: "Prayer", meditation: "Meditation", worship: "Worship" };

const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAYS_IN_MONTH = [31,29,31,30,31,30,31,31,30,31,30,31]; // Feb 29 included since some entries use it
const TOTAL_DAYS = DAYS_IN_MONTH.reduce((a,b) => a+b, 0);

// ---- Verses added on this device via the "+ Add a verse" window -----------
// Stored in localStorage only (this browser/device), not synced anywhere else,
// until they're copied and sent back to Claude to be baked into the file for good.

function loadPending() {
  try { return JSON.parse(localStorage.getItem("pendingVerses") || "[]"); }
  catch (e) { return []; }
}
function savePendingList(list) {
  localStorage.setItem("pendingVerses", JSON.stringify(list));
}
function mergePending() {
  for (const cat of ["worship","meditation","prayer"]) {
    for (const key of Object.keys(INDEX[cat])) {
      INDEX[cat][key] = INDEX[cat][key].filter(e => !e.pending);
      if (INDEX[cat][key].length === 0) delete INDEX[cat][key];
    }
  }
  const pending = loadPending();
  for (const item of pending) {
    const key = item.m + "-" + item.d;
    if (!INDEX[item.cat][key]) INDEX[item.cat][key] = [];
    INDEX[item.cat][key].push({ ref: item.ref, text: item.text, pending: true, pendingId: item.id });
  }
  return pending;
}
function removePending(id) {
  savePendingList(loadPending().filter(p => p.id !== id));
  mergePending();
  render();
  renderProgress();
  renderPendingBar();
}

function computeStats(cat) {
  const idx = INDEX[cat];
  let filled = 0;
  let nextGap = null;
  for (let m = 1; m <= 12; m++) {
    for (let d = 1; d <= DAYS_IN_MONTH[m-1]; d++) {
      const key = m + "-" + d;
      if (idx[key]) {
        filled++;
      } else if (nextGap === null) {
        nextGap = { m, d };
      }
    }
  }
  return { filled, nextGap };
}

function renderProgress() {
  const el = document.getElementById("progress");
  el.innerHTML = "";
  for (const cat of ["worship","meditation","prayer"]) {
    const { filled, nextGap } = computeStats(cat);
    const pill = document.createElement("div");
    const complete = nextGap === null;
    pill.className = "pill" + (complete ? " complete" : "");
    pill.innerHTML = LABELS[cat] + " <b>" + filled + "/" + TOTAL_DAYS + "</b>" +
      (complete ? " — complete" : " — next: " + MONTH_NAMES[nextGap.m-1].slice(0,3) + " " + nextGap.d);
    if (!complete) {
      pill.title = "Jump to the next day missing a " + cat + " verse";
      pill.addEventListener("click", () => {
        current = new Date(current.getFullYear(), nextGap.m - 1, nextGap.d);
        render();
      });
    }
    el.appendChild(pill);
  }
}

function renderPendingBar() {
  const bar = document.getElementById("pendingBar");
  const pending = loadPending();
  bar.innerHTML = "";
  if (pending.length === 0) {
    bar.classList.remove("show");
    return;
  }
  bar.classList.add("show");
  const label = document.createElement("span");
  label.textContent = pending.length + " verse" + (pending.length === 1 ? "" : "s") +
    " added on this device — not yet saved everywhere.";
  bar.appendChild(label);

  const copyBtn = document.createElement("button");
  copyBtn.textContent = "Copy for Claude";
  copyBtn.addEventListener("click", () => {
    const text = pending.map(p =>
      MONTH_NAMES[p.m-1].slice(0,3) + " " + p.d + " | " + LABELS[p.cat] + "\n" + p.ref + "\n" + p.text
    ).join("\n\n");
    openCopyModal(text);
  });
  bar.appendChild(copyBtn);

  const clearBtn = document.createElement("button");
  clearBtn.textContent = "Clear all";
  clearBtn.addEventListener("click", () => {
    if (!confirm("Remove all " + pending.length + " pending verse(s) from this device?")) return;
    savePendingList([]);
    mergePending();
    render();
    renderProgress();
    renderPendingBar();
  });
  bar.appendChild(clearBtn);
}

let current = new Date();
current.setHours(0,0,0,0);

function toKey(date) {
  return (date.getMonth() + 1) + "-" + date.getDate();
}

function renderVerseText(container, text, terms) {
  container.innerHTML = "";
  if (!terms || !terms.length) {
    container.textContent = text;
    return;
  }
  const found = [];
  for (const t of terms) {
    const idx = text.indexOf(t.match);
    if (idx !== -1) found.push({ start: idx, end: idx + t.match.length, term: t });
  }
  found.sort((a, b) => a.start - b.start);
  const clean = [];
  let lastEnd = -1;
  for (const f of found) {
    if (f.start >= lastEnd) { clean.push(f); lastEnd = f.end; }
  }
  if (!clean.length) {
    container.textContent = text;
    return;
  }
  let pos = 0;
  for (const f of clean) {
    if (f.start > pos) container.appendChild(document.createTextNode(text.slice(pos, f.start)));
    const btn = document.createElement("button");
    btn.className = "gloss-word";
    btn.textContent = text.slice(f.start, f.end);
    btn.addEventListener("click", () => openWordModal(f.term.label || f.term.match, GLOSSARY[f.term.key]));
    container.appendChild(btn);
    pos = f.end;
  }
  if (pos < text.length) container.appendChild(document.createTextNode(text.slice(pos)));
}

function render() {
  document.getElementById("dateSub").textContent = DAY_NAMES[current.getDay()];
  document.getElementById("datePicker").value = current.toISOString().slice(0,10);

  const key = toKey(current);
  const cards = document.getElementById("cards");
  cards.innerHTML = "";

  for (const cat of ["worship","meditation","prayer"]) {
    const entries = INDEX[cat][key];
    if (entries && entries.length) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.cat = cat;
      card.dataset.key = key;
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = LABELS[cat];
      card.appendChild(label);
      for (const e of entries) {
        const block = document.createElement("div");
        block.className = "verse-block" + (e.pending ? " pending" : "");
        if (e.pending) {
          const tag = document.createElement("div");
          tag.className = "pending-tag";
          tag.textContent = "Added on this device only — not yet saved everywhere";
          block.appendChild(tag);
        }
        const t = document.createElement("div");
        t.className = "verse-text";
        renderVerseText(t, e.text, DAY_TERMS[cat] && DAY_TERMS[cat][key]);
        const r = document.createElement("div");
        r.className = "verse-ref";
        r.textContent = e.ref;
        block.appendChild(t);
        block.appendChild(r);
        if (e.pending) {
          const rm = document.createElement("button");
          rm.className = "pending-remove";
          rm.textContent = "Remove";
          rm.addEventListener("click", () => removePending(e.pendingId));
          block.appendChild(rm);
        }
        card.appendChild(block);
      }
      cards.appendChild(card);
    } else {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = LABELS[cat];
      empty.appendChild(label);
      const msg = document.createElement("div");
      msg.textContent = "No " + cat + " verse added yet for this day.";
      empty.appendChild(msg);
      cards.appendChild(empty);
    }
  }

  renderStudyPanel(key);
}

function renderStudyPanel(key) {
  const panel = document.getElementById("studyPanel");
  panel.innerHTML = "";

  const rows = [];
  for (const cat of ["worship","meditation","prayer"]) {
    const entries = INDEX[cat][key];
    if (entries && entries.length) rows.push({ cat, ref: entries[0].ref });
  }
  if (rows.length === 0) {
    panel.style.display = "none";
    return;
  }
  panel.style.display = "";

  const wasOpen = panel.dataset.open === "true";

  const toggle = document.createElement("button");
  toggle.className = "study-toggle";
  toggle.innerHTML = "<span>\u{1F4D6} Study Today’s Verses</span><span>" + (wasOpen ? "▲" : "▼") + "</span>";

  const body = document.createElement("div");
  body.className = "study-body" + (wasOpen ? " open" : "");

  for (const { cat, ref } of rows) {
    const row = document.createElement("div");
    row.className = "study-row";
    row.dataset.cat = cat;
    row.dataset.key = key;
    const label = document.createElement("div");
    label.className = "study-label";
    label.textContent = LABELS[cat];
    const refEl = document.createElement("div");
    refEl.className = "study-ref";
    refEl.textContent = ref;
    row.appendChild(label);
    row.appendChild(refEl);

    const explanation = EXPLANATIONS[cat] && EXPLANATIONS[cat][key];
    if (explanation) {
      const exp = document.createElement("div");
      exp.className = "study-explanation";
      exp.textContent = explanation;
      row.appendChild(exp);
    } else {
      const note = document.createElement("div");
      note.className = "study-unavailable";
      note.textContent = "Explanation for this one is coming — verses are being written in order, day by day.";
      row.appendChild(note);
    }
    body.appendChild(row);
  }

  toggle.addEventListener("click", () => {
    const nowOpen = !body.classList.contains("open");
    body.classList.toggle("open", nowOpen);
    panel.dataset.open = nowOpen ? "true" : "false";
    toggle.querySelector("span:last-child").textContent = nowOpen ? "▲" : "▼";
  });

  panel.appendChild(toggle);
  panel.appendChild(body);
}

  }

// ---- Select any word or phrase to look it up in the glossary ---------------

function normalizeForLookup(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:"“”‘’]/g, "").replace(/\s+/g, " ");
}

function findGlossaryMatch(selectedText) {
  const norm = normalizeForLookup(selectedText);
  if (!norm) return null;
  if (GLOSSARY[norm]) return norm;
  const singular = norm.replace(/s$/, "");
  if (GLOSSARY[singular]) return singular;
  return null;
}

function findSourceCard(node) {
  const el = node && (node.nodeType === 1 ? node : node.parentElement);
  return el && el.closest(".card, .study-row");
}

function findSourceRef(node) {
  const card = findSourceCard(node);
  if (!card) return null;
  const label = card.querySelector(".label, .study-label");
  const ref = card.querySelector(".verse-ref, .study-ref");
  if (!label || !ref) return null;
  return label.textContent + " " + ref.textContent;
}

const defineBar = document.getElementById("defineBar");
const defineBtn = document.getElementById("defineFloatBtn");
const commentaryBtn = document.getElementById("commentaryFloatBtn");
let currentSelectionText = "";
let currentSelectionSource = null;
let currentSelectionCard = null;

function isInsideLookupArea(node) {
  const el = node && (node.nodeType === 1 ? node : node.parentElement);
  return !!(el && el.closest(".verse-text, .study-explanation"));
}

function updateDefineButton() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || sel.rangeCount === 0) {
    defineBar.classList.remove("show");
    return;
  }
  const text = sel.toString().trim();
  if (!text || text.length > 60 || !isInsideLookupArea(sel.anchorNode)) {
    defineBar.classList.remove("show");
    return;
  }
  currentSelectionText = text;
  currentSelectionSource = findSourceRef(sel.anchorNode);
  currentSelectionCard = findSourceCard(sel.anchorNode);
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  defineBar.style.left = (rect.left + rect.width / 2 + window.scrollX) + "px";
  defineBar.style.top = (rect.bottom + window.scrollY + 14) + "px";
  defineBar.classList.add("show");
}

let selectionTimer;
document.addEventListener("selectionchange", () => {
  clearTimeout(selectionTimer);
  selectionTimer = setTimeout(updateDefineButton, 150);
});

defineBar.addEventListener("mousedown", (e) => e.preventDefault());

defineBtn.addEventListener("click", () => {
  const text = currentSelectionText;
  defineBar.classList.remove("show");
  window.getSelection().removeAllRanges();
  const key = findGlossaryMatch(text);
  if (key) {
    openWordModal(text, GLOSSARY[key]);
  } else {
    openWordModal(text, "No definition written yet for this word.");
  }
});

commentaryBtn.addEventListener("click", () => {
  const source = currentSelectionSource;
  const card = currentSelectionCard;
  defineBar.classList.remove("show");
  window.getSelection().removeAllRanges();
  const cat = card && card.dataset.cat;
  const key = card && card.dataset.key;
  const title = source || "Commentary";
  const explanation = cat && key && EXPLANATIONS[cat] && EXPLANATIONS[cat][key];
  openWordModal(title, explanation || "Explanation for this one is coming — verses are being written in order, day by day.");
});

document.getElementById("addVerseBtn").addEventListener("click", openModal);
document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("fCancel").addEventListener("click", closeModal);
overlay.addEventListener("click", (e) => {
  if (e.target === overlay) closeModal();
});

document.getElementById("fUseGap").addEventListener("click", () => {
  const { nextGap } = computeStats(fCategory.value);
  if (!nextGap) {
    alert("Every day already has a " + fCategory.value + " verse!");
    return;
  }
  fMonth.value = nextGap.m;
  populateDays(nextGap.d);
});

document.getElementById("fSave").addEventListener("click", () => {
  const ref = fRef.value.trim();
  const text = fText.value.trim();
  if (!ref || !text) {
    alert("Please fill in both the reference and the verse text.");
    return;
  }
  const item = {
    id: Date.now() + "-" + Math.random().toString(36).slice(2, 8),
    cat: fCategory.value,
    m: Number(fMonth.value),
    d: Number(fDay.value),
    ref: ref,
    text: text
  };
  const list = loadPending();
  list.push(item);
  savePendingList(list);
  mergePending();
  current = new Date(current.getFullYear(), item.m - 1, item.d);
  closeModal();
  render();
  renderProgress();
  renderPendingBar();
});

mergePending();
render();
renderProgress();
renderPendingBar();
</script>
</body>
</html>
